nvidia_security:
  # deepseek-r1 removed (EOL 2026-01-26 — 410 Gone). nemotron-ultra takes its slot.
  # shieldgemma (google/shieldgemma-9b) EOL 2026-04-15 — removed. Use llama-guard or nemotron-safety.
  - id: nemotron-ultra
    provider: nvidia/llama-3.1-nemotron-ultra-253b-v1
    role: audit-reasoner
    notes: Vuln analysis, secure-code review, compliance audits
    recommended_for: [security-audit, deep-reasoning]
  - id: qwen3-coder
    provider: qwen/qwen3-coder-480b-a35b-instruct
    role: code-auditor
    notes: SAST-style review, taint analysis, fix suggestions
    recommended_for: [security-audit]
