# Single source of truth for multi-model plugin catalog.
# Changes here flow to MODELS.md via `node scripts/gen-docs.mjs`.
# Keep entries grouped by MCP. Lanes used by `recommended:` must exist in the
# `recommended_for` lists below, otherwise gen-docs will not highlight them.

