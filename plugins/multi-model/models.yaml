# Curated top picks per lane. One or two entries each — used by advisor skill
# and surfaced in MODELS.md. Keep this list tight; it is opinion, not inventory.
recommended:
  agentic-coding:
    - { mcp: nvidia_nim, model: qwen3-coder }
    - { mcp: ollama, model: glm-5.1:cloud }
  deep-reasoning:
    - { mcp: nvidia_nim, model: nemotron-ultra }
    - { mcp: ollama, model: kimi-k2-thinking:cloud }
  multimodal:
    - { mcp: nvidia_nim, model: gemma4 }
    - { mcp: copilot, model: gemini-3-pro }
  long-context:
    - { mcp: copilot, model: gemini-3-pro }
    - { mcp: ollama, model: qwen3-coder:480b-cloud }
  bulk:
    - { mcp: ollama, model: devstral-small-2:24b-cloud }
    - { mcp: copilot, model: claude-haiku-4.5 }
  security-audit:
    - { mcp: nvidia_security, model: nemotron-ultra }
    - { mcp: nvidia_security, model: qwen3-coder }
  pii:
    - { mcp: nvidia_security, model: gliner-pii }
  safety-guard:
    - { mcp: nvidia_security, model: llama-guard }
    - { mcp: nvidia_security, model: nemotron-safety }
  cross-vendor:
    - { mcp: copilot, model: gpt-5.3-codex }
    - { mcp: copilot, model: gemini-3-pro }
