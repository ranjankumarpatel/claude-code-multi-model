title: claude-code-multi-model
description: >
  Portable Claude Code plugin for automatic multi-model orchestration
  across 7 providers with 44+ models. Zero manual model selection required.
url: "https://ranjankumarpatel.github.io"
baseurl: "/claude-code-multi-model"

# Pure HTML/CSS landing page — no Jekyll theme processing needed
theme: null

# Tell GitHub Pages to serve the docs/ folder as-is
# index.html is a self-contained single-file page (no external deps)

# Exclude project source files from Jekyll build
exclude:
  - "*.md"
  - "*.json"
  - "*.csv"
  - plugins/
  - skills/
  - skills-lock.json
  - AGENTS.md
  - CLAUDE.md
  - MCP-SETUP.md
  - MODELS.md
  - models-raw.json
  - models-tiles.json
  - nvidia-preview-models.csv
